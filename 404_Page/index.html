<!DOCTYPE html>
<html lang="zh-tw">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Page not found</title>
</head>
<body>
    <script type="text/javascript">
        function Redirect() {
            window.location = "../index.html";
        }
        function load404page() {
            // 設定虛擬路徑
            var newUrl="../"
            var newTitle="404 Page not found"
            history.pushState(null, "page", newUrl);
            document.title = newTitle;
            // 跳轉首頁
            var time = 10;
            timer = setTimeout('Redirect()', time * 1000); //跳轉
        }
        load404page()
    </script>
    <style>
        .btn{
            -webkit-text-size-adjust: 100%;
            word-break: normal;
            tab-size: 4;
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: rgba(0,0,0,0);
            visibility: visible;
            font-family: DM Sans,Noto Sans TC,PingFangTC,Microsoft JhengHei,sans-serif;
            line-height: 1.5;
            -webkit-box-direction: normal;
            text-align: center;
            background-repeat: no-repeat;
            box-sizing: inherit;
            margin: 0;
            text-decoration: none;
            cursor: pointer;
            color: #fff;
            padding: .5rem 6rem;
            background-color: #cf1219;
            border-radius: 10rem;
            font-size: 2rem;
        }
        .main_body{
            width: 100%;
        }
        .main-text{
            width: 100%;
        }
        h1{
            -webkit-tap-highlight-color: transparent;
            -webkit-text-size-adjust: 100%;
            color: #484848;
            -webkit-font-smoothing: antialiased;
            line-break: strict;
            font-family: Circular,"Hiragino Sans GB","华文细黑","STHeiti","微软雅黑","Microsoft YaHei",SimHei,"Helvetica Neue",Helvetica,Arial,sans-serif !important;
            box-sizing: border-box;
            margin: 0.67em 0;
            line-height: 1.1;
            text-rendering: optimizelegibility;
            margin-bottom: 15px;
            font-weight: 700;
            /* display: none !important; */
            font-size: 145px;
            margin-top: 0;
        }
        h2{
            -webkit-tap-highlight-color: transparent;
            -webkit-text-size-adjust: 100%;
            color: #484848;
            -webkit-font-smoothing: antialiased;
            line-break: strict;
            font-family: Circular,"Hiragino Sans GB","华文细黑","STHeiti","微软雅黑","Microsoft YaHei",SimHei,"Helvetica Neue",Helvetica,Arial,sans-serif !important;
            box-sizing: border-box;
            line-height: 1.1;
            text-rendering: optimizelegibility;
            font-weight: normal;
            font-size: 30px;
            margin-top: 25px;
            margin-bottom: 15px;
        }
        h6{
            -webkit-tap-highlight-color: transparent;
            -webkit-text-size-adjust: 100%;
            -webkit-font-smoothing: antialiased;
            line-break: strict;
            font-family: Circular,"Hiragino Sans GB","华文细黑","STHeiti","微软雅黑","Microsoft YaHei",SimHei,"Helvetica Neue",Helvetica,Arial,sans-serif !important;
            box-sizing: border-box;
            line-height: 1.1;
            text-rendering: optimizelegibility;
            font-weight: bold;
            color: #767676;
            font-size: 13px;
            margin-top: 25px;
            margin-bottom: 15px;  
        }
        .container{
            display: flex;
            justify-content: center; 
            align-items: center; 
        }
        .block{
            display: block;
        }
        .btns{
            margin-top: 10%;
        }
        .img-1{
            width: 20%;
            display: flex;
            margin: auto;
        }
        #img-1{
            width: 100%;
        }
        .wrapper {
            min-height:100%;
        }
        .footer{
            height: 50px;
            width: 100%;
            /* background-color: #cf1219; */
            position: absolute;
            bottom: 15%;
        }
        html, body {
            height: 100%;
            margin: 0;
        }
        #pin-1{
            width: 100%;
            padding-right: 10px;
            font-size: 30px;
            
        }
    </style>

    <div class="main-main wrapper">
        <section id="main_body">
            <div class="main-text container">
                <h1>Oops!</h1>
            </div>
            <div class="main-text container">
                <h2>我們找不到您要找的頁面</h2>
            </div>
            <div class="main-text container">
                <h6>錯誤代碼：404</h6>
            </div>
            <div class="container btns">
                <a class="btn" href="../index.html">帶我回首頁</a>
            </div>
        </section>
        <section class="footer">
            <div class="img-1">
                <h2 id="pin-1" class="container">By NHDK</h2>
                <!-- <img id="img-1" src="./1.png" alt=""> -->
            </div>
